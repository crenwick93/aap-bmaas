---
- name: ServiceNow — Provisioning started
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve SNOW vars from EDA event
      ansible.builtin.set_fact:
        snow_ritm_sys_id: "{{ ansible_eda.event.sys_id }}"
        snow_ritm_number: "{{ ansible_eda.event.number }}"
      when: snow_ritm_sys_id is not defined and ansible_eda is defined

    - name: Find the task
      servicenow.itsm.api_info:
        resource: sc_task
        sysparm_query: "request_item={{ snow_ritm_sys_id }}^short_description=Provision & Configure Server"
      register: snow_task
      when: snow_ritm_sys_id is defined

    - name: Save task sys_id
      ansible.builtin.set_fact:
        snow_task_id: "{{ snow_task.record[0].sys_id }}"
      when: snow_ritm_sys_id is defined and (snow_task.record | default([])) | length > 0

    - name: Set task to Work in Progress
      servicenow.itsm.api:
        resource: sc_task
        action: patch
        sys_id: "{{ snow_task_id }}"
        data:
          state: "2"
          comments: "[AAP] Provisioning started — booting to RHEL 9 ISO via iDRAC."
      when: snow_task_id is defined

- name: Provision RHEL 9 on Dell T620 via iDRAC BootToNetworkISO
  hosts: idrac
  gather_facts: false
  pre_tasks:
    - name: Load local secrets if available
      ansible.builtin.include_vars:
        file: ../vault/idrac_secrets.yml
      failed_when: false
      no_log: true
  tasks:
    - name: Wait for Lifecycle Controller to be ready
      dellemc.openmanage.idrac_lifecycle_controller_status_info:
        idrac_ip: "{{ inventory_hostname }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
      register: lc_status
      until: lc_status.lc_status_info.LCStatus == "Ready"
      retries: 30
      delay: 30

    - name: Boot T620 to RHEL 9 unattended ISO over NFS
      dellemc.openmanage.idrac_os_deployment:
        idrac_ip: "{{ inventory_hostname }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
        share_name: "{{ iso_share }}"
        iso_image: "{{ iso_image }}"
        expose_duration: 18
      register: osd_result

    - name: Show deployment job result
      ansible.builtin.debug:
        var: osd_result

- name: ServiceNow — ISO boot complete
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Post progress
      servicenow.itsm.api:
        resource: sc_task
        action: patch
        sys_id: "{{ snow_task_id }}"
        data:
          comments: "[AAP] ISO boot complete — RHEL 9 unattended installation in progress."
      when: snow_task_id is defined
