---
- name: Update ServiceNow — Provisioning started
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Post work note
      servicenow.itsm.api:
        resource: sc_req_item
        action: patch
        sys_id: "{{ snow_ritm_sys_id }}"
        data:
          state: "2"
          work_notes: "[Ansible Automation Platform] Provisioning started — booting to RHEL 9 ISO via iDRAC."
      when: snow_ritm_sys_id is defined

- name: Provision RHEL 9 on Dell T620 via iDRAC BootToNetworkISO
  hosts: idrac
  gather_facts: false
  pre_tasks:
    - name: Load local secrets if available
      ansible.builtin.include_vars:
        file: ../vault/idrac_secrets.yml
      failed_when: false
      no_log: true
  tasks:
    - name: Wait for Lifecycle Controller to be ready
      dellemc.openmanage.idrac_lifecycle_controller_status_info:
        idrac_ip: "{{ inventory_hostname }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
      register: lc_status
      until: lc_status.lc_status_info.LCStatus == "Ready"
      retries: 30
      delay: 30

    - name: Boot T620 to RHEL 9 unattended ISO over NFS
      dellemc.openmanage.idrac_os_deployment:
        idrac_ip: "{{ inventory_hostname }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
        share_name: "{{ iso_share }}"
        iso_image: "{{ iso_image }}"
        expose_duration: 18
      register: osd_result

    - name: Show deployment job result
      ansible.builtin.debug:
        var: osd_result
