---
- name: ServiceNow — iDRAC test in progress
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve SNOW vars from EDA event
      ansible.builtin.set_fact:
        snow_ritm_sys_id: "{{ ansible_eda.event.sys_id }}"
        snow_ritm_number: "{{ ansible_eda.event.number }}"
      when: snow_ritm_sys_id is not defined and ansible_eda is defined

    - name: Find the task
      servicenow.itsm.api_info:
        resource: sc_task
        sysparm_query: "request_item={{ snow_ritm_sys_id }}^short_description=Provision & Configure Server"
      register: snow_task
      when: snow_ritm_sys_id is defined

    - name: Save task sys_id
      ansible.builtin.set_fact:
        snow_task_id: "{{ snow_task.record[0].sys_id }}"
      when: snow_ritm_sys_id is defined and (snow_task.record | default([])) | length > 0

    - name: Set task to Work in Progress
      servicenow.itsm.api:
        resource: sc_task
        action: patch
        sys_id: "{{ snow_task_id }}"
        data:
          state: "2"
          work_notes: "[AAP] Testing iDRAC connectivity and validating execution environment."
      when: snow_task_id is defined

- name: Test iDRAC connectivity and EE module availability
  hosts: idrac
  gather_facts: false
  pre_tasks:
    - name: Load local secrets if available
      ansible.builtin.include_vars:
        file: ../vault/idrac_secrets.yml
      failed_when: false
      no_log: true
  tasks:
    - name: Get iDRAC system info
      dellemc.openmanage.idrac_system_info:
        idrac_ip: "{{ inventory_hostname }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
      register: system_info

    - name: Show system info
      ansible.builtin.debug:
        var: system_info

- name: ServiceNow — iDRAC test complete
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Post completion
      servicenow.itsm.api:
        resource: sc_task
        action: patch
        sys_id: "{{ snow_task_id }}"
        data:
          work_notes: "[AAP] iDRAC connectivity test passed — server is reachable and EE is functional."
      when: snow_task_id is defined
