---
- name: Test iDRAC connectivity and EE module availability
  hosts: idrac
  gather_facts: false
  pre_tasks:
    - name: Load local secrets if available
      ansible.builtin.include_vars:
        file: ../vault/idrac_secrets.yml
      failed_when: false
      no_log: true
  tasks:
    - name: Get iDRAC system info
      dellemc.openmanage.idrac_system_info:
        idrac_ip: "{{ inventory_hostname }}"
        idrac_user: "{{ idrac_user }}"
        idrac_password: "{{ idrac_password }}"
        validate_certs: false
      register: system_info

    - name: Show system info
      ansible.builtin.debug:
        var: system_info
