---
- name: Wait for install to complete, detach ISO, and boot into RHEL 9
  hosts: idrac
  gather_facts: false
  pre_tasks:
    - name: Load local secrets if available
      ansible.builtin.include_vars:
        file: ../vault/idrac_secrets.yml
      failed_when: false
      no_log: true
  tasks:
    - name: Wait for server to power off after install completes
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/redfish/v1/Systems/System.Embedded.1"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        force_basic_auth: true
      register: redfish_system
      until: redfish_system.json.PowerState == "Off"
      retries: 120
      delay: 30

    - name: Wait for virtual media to auto-disconnect
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/redfish/v1/Managers/iDRAC.Embedded.1/VirtualMedia/CD"
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        force_basic_auth: true
      register: vmedia
      until: vmedia.json.Inserted == false
      retries: 40
      delay: 30

    - name: Power on server from disk
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
        method: POST
        user: "{{ idrac_user }}"
        password: "{{ idrac_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: json
        body:
          ResetType: "On"
        status_code: [200, 204]

- name: Verify RHEL 9 is online
  hosts: t620
  gather_facts: false
  vars:
    wait_timeout: 600
  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: "{{ wait_timeout }}"
        sleep: 15

    - name: Gather facts
      ansible.builtin.setup:

    - name: Confirm RHEL 9 is installed
      ansible.builtin.assert:
        that:
          - ansible_distribution == "RedHat"
          - ansible_distribution_major_version == "9"
        fail_msg: "Expected RHEL 9 but found {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Show host details
      ansible.builtin.debug:
        msg: >-
          {{ ansible_hostname }} is online —
          {{ ansible_distribution }} {{ ansible_distribution_version }},
          {{ ansible_processor_vcpus }} vCPUs,
          {{ ansible_memtotal_mb }} MB RAM

- name: ServiceNow — OS installed and verified
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve SNOW vars from EDA event
      ansible.builtin.set_fact:
        snow_ritm_sys_id: "{{ ansible_eda.event.sys_id }}"
        snow_ritm_number: "{{ ansible_eda.event.number }}"
      when: snow_ritm_sys_id is not defined and ansible_eda is defined

    - name: Find the task
      servicenow.itsm.api_info:
        resource: sc_task
        sysparm_query: "request_item={{ snow_ritm_sys_id }}^short_description=Provision & Configure Server"
      register: snow_task
      when: snow_ritm_sys_id is defined

    - name: Save task sys_id
      ansible.builtin.set_fact:
        snow_task_id: "{{ snow_task.record[0].sys_id }}"
      when: snow_ritm_sys_id is defined and (snow_task.record | default([])) | length > 0

    - name: Post progress
      servicenow.itsm.api:
        resource: sc_task
        action: patch
        sys_id: "{{ snow_task_id }}"
        data:
          work_notes: "[AAP] RHEL 9 installed and verified — server is online"
      when: snow_task_id is defined
