---
- name: Prepare environment — golden image, kickstarts, ISOs, and NFS
  hosts: nfs
  become: true
  gather_facts: true

  vars:
    iso_dir: /srv/iso
    blueprint_name: rhel9-golden
    ssh_pub_key: "{{ lookup('pipe', 'ssh-keygen -y -f ' ~ playbook_dir ~ '/../vault/laptop_ssh_key') }}"
    idrac_ip: "192.168.50.252"
    golden_iso: "{{ iso_dir }}/rhel9-golden.iso"
    stock_iso: "{{ lookup('env', 'STOCK_ISO') | default('rhel-9-x86_64-dvd.iso', true) }}"
    input_iso: "{{ golden_iso }}"
    golden_image_build: true

  vars_files:
    - ../vault/idrac_secrets.yml

  tasks:
    # ------------------------------------------------------------------
    # 1. Install prerequisites
    # ------------------------------------------------------------------
    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - lorax
          - nfs-utils
          - firewalld
          - osbuild-composer
          - composer-cli
        state: present

    # ------------------------------------------------------------------
    # 2. Build golden image (skip with -e golden_image_build=false)
    # ------------------------------------------------------------------
    - name: Start osbuild-composer
      ansible.builtin.systemd:
        name: osbuild-composer.socket
        state: started
        enabled: true
      when: golden_image_build | bool

    - name: Copy blueprint to host
      ansible.builtin.copy:
        src: ../golden-image/blueprint.toml
        dest: /tmp/rhel9-golden-blueprint.toml
        mode: "0644"
      when: golden_image_build | bool

    - name: Inject SSH public key into blueprint
      ansible.builtin.replace:
        path: /tmp/rhel9-golden-blueprint.toml
        regexp: "REPLACE_WITH_SSH_PUBLIC_KEY"
        replace: "{{ ssh_pub_key }}"
      when: golden_image_build | bool

    - name: Push blueprint to Image Builder
      ansible.builtin.command:
        cmd: composer-cli blueprints push /tmp/rhel9-golden-blueprint.toml
      changed_when: true
      when: golden_image_build | bool

    - name: Resolve blueprint dependencies
      ansible.builtin.command:
        cmd: "composer-cli blueprints depsolve {{ blueprint_name }}"
      changed_when: false
      when: golden_image_build | bool

    - name: Start golden image compose
      ansible.builtin.command:
        cmd: "composer-cli compose start {{ blueprint_name }} image-installer"
      register: compose_start
      changed_when: true
      when: golden_image_build | bool

    - name: Extract compose ID
      ansible.builtin.set_fact:
        compose_id: "{{ compose_start.stdout.split()[1] }}"
      when: golden_image_build | bool

    - name: Wait for golden image build to finish (10-20 minutes)
      ansible.builtin.command:
        cmd: "composer-cli compose status"
      register: compose_status
      until: "compose_status.stdout is search(compose_id ~ '\\s+FINISHED')"
      retries: 60
      delay: 30
      changed_when: false
      failed_when: "compose_status.stdout is search(compose_id ~ '\\s+FAILED')"
      when: golden_image_build | bool

    - name: Create ISO directory
      ansible.builtin.file:
        path: "{{ iso_dir }}"
        state: directory
        mode: "0755"

    - name: Remove old golden image ISO if present
      ansible.builtin.file:
        path: "{{ golden_iso }}"
        state: absent
      when: golden_image_build | bool

    - name: Download golden image ISO
      ansible.builtin.command:
        cmd: "composer-cli compose image {{ compose_id }} --filename {{ golden_iso }}"
      when: golden_image_build | bool
      changed_when: true

    # ------------------------------------------------------------------
    # 3. Generate per-host kickstarts and build ISOs
    # ------------------------------------------------------------------
    - name: Create kickstart output directory on host
      ansible.builtin.file:
        path: /tmp/kickstarts
        state: directory
        mode: "0755"

    - name: Generate kickstart for each server
      ansible.builtin.template:
        src: ../kickstart/ks.cfg.j2
        dest: "/tmp/kickstarts/{{ hostvars[item]['ks_hostname'] }}.cfg"
        mode: "0644"
      loop: "{{ groups['servers'] }}"
      vars:
        ks_hostname: "{{ hostvars[item]['ks_hostname'] }}"
        ks_ip: "{{ hostvars[item]['ks_ip'] | default('') }}"
        ks_gateway: "{{ hostvars[item]['ks_gateway'] | default('') }}"
        ks_netmask: "{{ hostvars[item]['ks_netmask'] | default('255.255.255.0') }}"
        ks_dns: "{{ hostvars[item]['ks_dns'] | default('8.8.8.8') }}"
        ks_ssh_pubkey: "{{ ssh_pub_key }}"

    - name: Remove old per-host ISOs
      ansible.builtin.file:
        path: "{{ iso_dir }}/{{ item }}-baremetal.iso"
        state: absent
      loop: "{{ groups['servers'] }}"

    - name: Build per-host ISO
      ansible.builtin.command:
        cmd: >-
          mkksiso
          --ks /tmp/kickstarts/{{ hostvars[item]['ks_hostname'] }}.cfg
          -r rd.live.check
          -R 'set default="1"' 'set default="0"'
          {{ input_iso }}
          {{ iso_dir }}/{{ item }}-baremetal.iso
      loop: "{{ groups['servers'] }}"
      changed_when: true

    # ------------------------------------------------------------------
    # 4. Configure NFS share
    # ------------------------------------------------------------------
    - name: Create NFS exports directory
      ansible.builtin.file:
        path: /etc/exports.d
        state: directory
        mode: "0755"

    - name: Configure NFS export for iDRAC
      ansible.builtin.copy:
        dest: /etc/exports.d/iso.exports
        mode: "0644"
        content: "{{ iso_dir }} {{ idrac_ip }}(ro,sync,no_root_squash,no_subtree_check)\n"
      notify: reload nfs exports

    - name: Enable and start NFS server
      ansible.builtin.systemd:
        name: nfs-server
        state: started
        enabled: true

    - name: Enable and start firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open NFS services in firewall
      ansible.posix.firewalld:
        service: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - nfs
        - mountd
        - rpc-bind

    - name: Set SELinux boolean for NFS exports
      ansible.posix.seboolean:
        name: nfs_export_all_ro
        state: true
        persistent: true

    - name: Show summary
      ansible.builtin.debug:
        msg: >-
          Environment ready.
          ISOs in {{ iso_dir }},
          NFS exported to {{ idrac_ip }}.
          Run provision_rhel9.yml to deploy.

  handlers:
    - name: reload nfs exports
      ansible.builtin.command:
        cmd: exportfs -ra
      changed_when: true
