---
- name: Bare Metal Provisioning from ServiceNow Catalog
  hosts: all
  execution_strategy: parallel
  sources:
    - servicenow.itsm.records:
        table: sc_req_item
        interval: 30
        remote_servicenow_timezone: "Europe/London"
        sysparm_query: >
          state=1^approval=approved^cat_item.name=Bare Metal Server Request^ORDERBYDESCsys_created_on
      filters:
        - ansible.eda.json_filter:
        - ansible.eda.normalize_keys:
  rules:
    - name: Trigger bare metal deployment workflow
      throttle:
        once_within: 5 minutes
        group_by_attributes:
          - sys_id
      condition: event.number is defined
      action:
        run_job_template:
          name: Test iDRAC
          organization: Default
          extra_vars:
            snow_ritm_sys_id: "{{ event.sys_id }}"
            snow_ritm_number: "{{ event.number }}"
