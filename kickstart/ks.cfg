# Per-host kickstart — layered on top of the golden image ISO.
# Only server-specific config lives here; baseline is baked into the image.
text
eula --agreed

# Root password — generate with:
# python3 -c 'import crypt; print(crypt.crypt("YourDemoPass", crypt.mksalt(crypt.METHOD_SHA512)))'
rootpw --iscrypted REPLACE_WITH_SHA512_HASH

network --bootproto=dhcp --device=link --activate --hostname=t620-demo

bootloader --location=mbr
clearpart --all --initlabel
autopart --type=lvm

reboot
