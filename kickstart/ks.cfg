# RHEL 9 unattended kickstart — PoC / demo
text
eula --agreed
lang en_US.UTF-8
keyboard us
timezone Europe/London --utc

# Root password — paste the SHA-512 hash from the command below. Never plaintext.
# python3 -c 'import crypt; print(crypt.crypt("YourDemoPass", crypt.mksalt(crypt.METHOD_SHA512)))'
rootpw --iscrypted REPLACE_WITH_SHA512_HASH

# Network: bind to whichever interface has link. Avoids hardcoding em1/em2.
network --bootproto=dhcp --device=link --activate --hostname=t620-demo

# Disk: wipe and auto-partition with LVM.
# NOTE: clearpart --all is DESTRUCTIVE. Correct for this clean no-OS box and
# makes the demo repeatable, but it erases every disk it finds.
bootloader --location=mbr
clearpart --all --initlabel
autopart --type=lvm

# Pull only from the ISO's own repo — no internet dependency for a closed demo.
%packages
@^minimal-environment
%end

# Reboot into the installed OS when done.
reboot

%post --log=/root/ks-post.log
echo "Provisioned by AAP on $(date)" > /etc/motd
%end
