---
version: 3

dependencies:
  galaxy:
    collections:
      - name: infra.aap_configuration
      - name: awx.awx
  python: []
  system: []

options:
  package_manager_path: /usr/bin/microdnf

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/ee-minimal-rhel9:latest

additional_build_steps:
  append_galaxy:
    - RUN mkdir -p /usr/share/ansible/collections/ansible_collections/ansible || true
    - RUN ln -sf /usr/share/ansible/collections/ansible_collections/awx/awx /usr/share/ansible/collections/ansible_collections/ansible/controller
