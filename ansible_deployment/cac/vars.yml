---
# =============================================================================
# AAP Configuration as Code — Bare-Metal RHEL 9 Provisioning
# =============================================================================

# Using the Default organization

# -----------------------------------------------------------------------------
# Custom Credential Types
# -----------------------------------------------------------------------------
controller_credential_types:
  - name: "Dell iDRAC"
    description: "iDRAC out-of-band management credentials (WSMan/HTTPS)"
    kind: "cloud"
    inputs:
      fields:
        - id: IDRAC_USER
          type: string
          label: iDRAC Username
        - id: IDRAC_PASSWORD
          type: string
          label: iDRAC Password
          secret: true
      required:
        - IDRAC_USER
        - IDRAC_PASSWORD
    injectors:
      extra_vars:
        idrac_user: !unsafe "{{ IDRAC_USER }}"
        idrac_password: !unsafe "{{ IDRAC_PASSWORD }}"

  - name: "RHSM Credentials"
    description: "Red Hat Subscription Manager credentials for host registration"
    kind: "cloud"
    inputs:
      fields:
        - id: RHSM_USERNAME
          type: string
          label: RHSM Username
        - id: RHSM_PASSWORD
          type: string
          label: RHSM Password
          secret: true
      required:
        - RHSM_USERNAME
        - RHSM_PASSWORD
    injectors:
      extra_vars:
        rhsm_username: !unsafe "{{ RHSM_USERNAME }}"
        rhsm_password: !unsafe "{{ RHSM_PASSWORD }}"

  - name: "ServiceNow Credential"
    description: "ServiceNow instance access for CMDB and incident management"
    kind: "cloud"
    inputs:
      fields:
        - id: SN_HOST
          type: string
          label: Snow Instance
        - id: SN_USERNAME
          type: string
          label: Username
        - id: SN_PASSWORD
          type: string
          label: Password
          secret: true
      required:
        - SN_HOST
        - SN_USERNAME
        - SN_PASSWORD
    injectors:
      env:
        SN_HOST: !unsafe "{{ SN_HOST }}"
        SN_USERNAME: !unsafe "{{ SN_USERNAME }}"
        SN_PASSWORD: !unsafe "{{ SN_PASSWORD }}"

# -----------------------------------------------------------------------------
# Projects
# -----------------------------------------------------------------------------
controller_projects:
  - name: "Bare Metal Automation"
    description: "RHEL 9 provisioning and post-install configuration playbooks"
    organization: "Default"
    scm_type: "git"
    scm_url: "{{ git_repo_url }}"
    scm_branch: "main"
    scm_update_on_launch: true

# -----------------------------------------------------------------------------
# Inventories — single inventory with all host groups
# -----------------------------------------------------------------------------
controller_inventories:
  - name: "Bare Metal Deployment"
    description: "All hosts involved in bare-metal provisioning and configuration"
    organization: "Default"

# -----------------------------------------------------------------------------
# Hosts
# -----------------------------------------------------------------------------
controller_hosts:
  - name: "192.168.50.252"
    inventory: "Bare Metal Deployment"
    variables:
      ansible_connection: local
      iso_share: "192.168.50.251:/srv/iso"
      iso_image: "t620-demo-baremetal.iso"

  - name: "t620-demo"
    inventory: "Bare Metal Deployment"
    variables:
      ansible_host: "192.168.50.253"
      ansible_user: ansible
      ansible_become: true
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

# -----------------------------------------------------------------------------
# Groups
# -----------------------------------------------------------------------------
controller_groups:
  - name: "idrac"
    inventory: "Bare Metal Deployment"
    hosts:
      - "192.168.50.252"

  - name: "t620"
    inventory: "Bare Metal Deployment"
    hosts:
      - "t620-demo"

# -----------------------------------------------------------------------------
# Credentials
# -----------------------------------------------------------------------------
controller_credentials:
  - name: "T620 iDRAC"
    description: "iDRAC7 root credentials for Dell PowerEdge T620"
    organization: "Default"
    credential_type: "Dell iDRAC"
    inputs:
      IDRAC_USER: "root"
      IDRAC_PASSWORD: "{{ idrac_password }}"

  - name: "T620 SSH"
    description: "SSH access to the provisioned RHEL 9 host (ansible service account)"
    organization: "Default"
    credential_type: "Machine"
    inputs:
      username: ansible
      ssh_key_data: "{{ t620_ssh_key }}"
      become_method: sudo

  - name: "Red Hat Subscription"
    description: "RHSM credentials for registering provisioned hosts"
    organization: "Default"
    credential_type: "RHSM Credentials"
    inputs:
      RHSM_USERNAME: "{{ rhsm_username }}"
      RHSM_PASSWORD: "{{ rhsm_password }}"

  - name: "ServiceNow PDI"
    description: "ServiceNow developer instance for ITSM integration"
    organization: "Default"
    credential_type: "ServiceNow Credential"
    inputs:
      SN_HOST: "{{ servicenow_instance_url }}"
      SN_USERNAME: "{{ servicenow_username }}"
      SN_PASSWORD: "{{ servicenow_password }}"

# -----------------------------------------------------------------------------
# Execution Environments
# -----------------------------------------------------------------------------
controller_execution_environments:
  - name: "Bare Metal EE"
    description: "Custom EE with omsdk and dellemc.openmanage for iDRAC operations"
    organization: "Default"
    image: "{{ custom_ee_image }}"
    pull: "missing"

# -----------------------------------------------------------------------------
# Job Templates
# -----------------------------------------------------------------------------
controller_templates:
  - name: "Test iDRAC"
    description: "Non-destructive iDRAC connectivity and EE validation"
    organization: "Default"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/test_idrac.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 iDRAC"

  - name: "Provision RHEL 9"
    description: "Boot Dell T620 to unattended RHEL 9 ISO via iDRAC BootToNetworkISO over NFS"
    organization: "Default"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/provision_rhel9.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 iDRAC"

  - name: "Wait for Install"
    description: "Wait for power off, detach virtual media, boot to disk, verify RHEL 9"
    organization: "Default"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/wait_for_install.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 iDRAC"
      - "T620 SSH"

  - name: "Configure RHEL 9"
    description: "Register with RHSM and deploy demo web application"
    organization: "Default"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/configure_rhel9.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 SSH"
      - "Red Hat Subscription"

  - name: "Update ServiceNow Request"
    description: "Post a work note to the ServiceNow catalog request item"
    organization: "Default"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/update_snow_request.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    ask_variables_on_launch: true
    credentials:
      - "ServiceNow PDI"

  - name: "Close ServiceNow Request"
    description: "Update the ServiceNow catalog request item to Closed Complete"
    organization: "Default"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/close_snow_request.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    ask_variables_on_launch: true
    credentials:
      - "ServiceNow PDI"

# -----------------------------------------------------------------------------
# Workflow Templates
# -----------------------------------------------------------------------------
controller_workflows:
  - name: "End-to-End Bare Metal Deployment"
    description: "Provision RHEL 9 on bare metal, configure the host, and update ServiceNow at each stage"
    organization: "Default"
    simplified_workflow_nodes:
      - identifier: "SNOW — Provisioning Started"
        unified_job_template: "Update ServiceNow Request"
        extra_data:
          snow_message: "[Ansible Automation Platform] Provisioning started — booting to RHEL 9 ISO via iDRAC."
          snow_state: "2"
        success_nodes:
          - "Provision RHEL 9"

      - identifier: "Provision RHEL 9"
        unified_job_template: "Provision RHEL 9"
        success_nodes:
          - "SNOW — OS Installing"

      - identifier: "SNOW — OS Installing"
        unified_job_template: "Update ServiceNow Request"
        extra_data:
          snow_message: "[Ansible Automation Platform] ISO boot successful — RHEL 9 unattended installation in progress."
          snow_state: "2"
        success_nodes:
          - "Wait for Install"

      - identifier: "Wait for Install"
        unified_job_template: "Wait for Install"
        success_nodes:
          - "SNOW — Configuring Service"

      - identifier: "SNOW — Configuring Service"
        unified_job_template: "Update ServiceNow Request"
        extra_data:
          snow_message: "[Ansible Automation Platform] OS installation complete — registering with RHSM and deploying application."
          snow_state: "2"
        success_nodes:
          - "Configure RHEL 9"

      - identifier: "Configure RHEL 9"
        unified_job_template: "Configure RHEL 9"
        success_nodes:
          - "Close ServiceNow Request"

      - identifier: "Close ServiceNow Request"
        unified_job_template: "Close ServiceNow Request"

# =============================================================================
# Event-Driven Ansible — ServiceNow Integration
# =============================================================================

# -----------------------------------------------------------------------------
# Decision Environments
# -----------------------------------------------------------------------------
eda_decision_environments:
  - name: "ServiceNow DE"
    description: "Decision environment with servicenow.itsm for catalog request polling"
    organization: "Default"
    image_url: "quay.io/crenwick93/snow-de:latest"

# -----------------------------------------------------------------------------
# EDA Projects
# -----------------------------------------------------------------------------
eda_projects:
  - name: "Bare Metal EDA"
    description: "EDA rulebooks for bare-metal provisioning triggered by ServiceNow"
    organization: "Default"
    url: "{{ git_repo_url }}"
    wait: true

# -----------------------------------------------------------------------------
# EDA Credential Types
# -----------------------------------------------------------------------------
eda_credential_types:
  - name: "ServiceNow Credential"
    description: "ServiceNow instance access for CMDB and incident management"
    inputs:
      fields:
        - id: SN_HOST
          type: string
          label: Snow Instance
        - id: SN_USERNAME
          type: string
          label: Username
        - id: SN_PASSWORD
          type: string
          label: Password
          secret: true
      required:
        - SN_HOST
        - SN_USERNAME
        - SN_PASSWORD
    injectors:
      env:
        SN_HOST: !unsafe "{{ SN_HOST }}"
        SN_USERNAME: !unsafe "{{ SN_USERNAME }}"
        SN_PASSWORD: !unsafe "{{ SN_PASSWORD }}"

# -----------------------------------------------------------------------------
# EDA Credentials
# -----------------------------------------------------------------------------
eda_credentials:
  - name: "AAP Controller Token"
    description: "Controller credential so EDA can launch job templates on AAP"
    credential_type: "Red Hat Ansible Automation Platform"
    organization: "Default"
    inputs:
      host: "https://{{ aap_hostname }}"
      oauth_token: "{{ aap_token }}"
      verify_ssl: false

  - name: "ServiceNow EDA"
    description: "ServiceNow credentials for the EDA records source plugin"
    credential_type: "ServiceNow Credential"
    organization: "Default"
    inputs:
      SN_HOST: "{{ servicenow_instance_url }}"
      SN_USERNAME: "{{ servicenow_username }}"
      SN_PASSWORD: "{{ servicenow_password }}"

# -----------------------------------------------------------------------------
# Rulebook Activations
# -----------------------------------------------------------------------------
eda_rulebook_activations:
  - name: "ServiceNow Bare Metal Requests"
    description: "Monitors ServiceNow for new Bare Metal Server Request catalog items"
    organization: "Default"
    project: "Bare Metal EDA"
    rulebook: "servicenow_request_rulebook.yml"
    decision_environment: "ServiceNow DE"
    enabled: true
    credentials:
      - "AAP Controller Token"
      - "ServiceNow EDA"
