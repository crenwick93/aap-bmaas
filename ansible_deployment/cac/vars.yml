---
# =============================================================================
# AAP Configuration as Code — Bare-Metal RHEL 9 Provisioning
# =============================================================================

# -----------------------------------------------------------------------------
# Organizations
# -----------------------------------------------------------------------------
aap_organizations:
  - name: "Bare Metal Provisioning"
    description: "End-to-end bare-metal lifecycle — provision and configure Dell PowerEdge servers"

# -----------------------------------------------------------------------------
# Custom Credential Types
# -----------------------------------------------------------------------------
controller_credential_types:
  - name: "Dell iDRAC"
    description: "iDRAC out-of-band management credentials (WSMan/HTTPS)"
    kind: "cloud"
    inputs:
      fields:
        - id: IDRAC_USER
          type: string
          label: iDRAC Username
        - id: IDRAC_PASSWORD
          type: string
          label: iDRAC Password
          secret: true
      required:
        - IDRAC_USER
        - IDRAC_PASSWORD
    injectors:
      extra_vars:
        idrac_user: !unsafe "{{ IDRAC_USER }}"
        idrac_password: !unsafe "{{ IDRAC_PASSWORD }}"

  - name: "RHSM Credentials"
    description: "Red Hat Subscription Manager credentials for host registration"
    kind: "cloud"
    inputs:
      fields:
        - id: RHSM_USERNAME
          type: string
          label: RHSM Username
        - id: RHSM_PASSWORD
          type: string
          label: RHSM Password
          secret: true
      required:
        - RHSM_USERNAME
        - RHSM_PASSWORD
    injectors:
      extra_vars:
        rhsm_username: !unsafe "{{ RHSM_USERNAME }}"
        rhsm_password: !unsafe "{{ RHSM_PASSWORD }}"

# -----------------------------------------------------------------------------
# Projects
# -----------------------------------------------------------------------------
controller_projects:
  - name: "Bare Metal Automation"
    description: "RHEL 9 provisioning and post-install configuration playbooks"
    organization: "Bare Metal Provisioning"
    scm_type: "git"
    scm_url: "{{ git_repo_url }}"
    scm_branch: "main"
    scm_update_on_launch: true

# -----------------------------------------------------------------------------
# Inventories — single inventory with all host groups
# -----------------------------------------------------------------------------
controller_inventories:
  - name: "Bare Metal Deployment"
    description: "All hosts involved in bare-metal provisioning and configuration"
    organization: "Bare Metal Provisioning"

# -----------------------------------------------------------------------------
# Hosts
# -----------------------------------------------------------------------------
controller_hosts:
  - name: "192.168.50.252"
    inventory: "Bare Metal Deployment"
    variables:
      ansible_connection: local

  - name: "t620-demo"
    inventory: "Bare Metal Deployment"
    variables:
      ansible_host: "192.168.50.253"
      ansible_user: ansible
      ansible_become: true
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

# -----------------------------------------------------------------------------
# Groups
# -----------------------------------------------------------------------------
controller_groups:
  - name: "idrac"
    inventory: "Bare Metal Deployment"
    hosts:
      - "192.168.50.252"

  - name: "t620"
    inventory: "Bare Metal Deployment"
    hosts:
      - "t620-demo"

# -----------------------------------------------------------------------------
# Credentials
# -----------------------------------------------------------------------------
controller_credentials:
  - name: "T620 iDRAC"
    description: "iDRAC7 root credentials for Dell PowerEdge T620"
    organization: "Bare Metal Provisioning"
    credential_type: "Dell iDRAC"
    inputs:
      IDRAC_USER: "root"
      IDRAC_PASSWORD: "{{ idrac_password }}"

  - name: "T620 SSH"
    description: "SSH access to the provisioned RHEL 9 host (ansible service account)"
    organization: "Bare Metal Provisioning"
    credential_type: "Machine"
    inputs:
      username: ansible
      ssh_key_data: "{{ t620_ssh_key }}"
      become_method: sudo

  - name: "Red Hat Subscription"
    description: "RHSM credentials for registering provisioned hosts"
    organization: "Bare Metal Provisioning"
    credential_type: "RHSM Credentials"
    inputs:
      RHSM_USERNAME: "{{ rhsm_username }}"
      RHSM_PASSWORD: "{{ rhsm_password }}"

# -----------------------------------------------------------------------------
# Execution Environments
# -----------------------------------------------------------------------------
controller_execution_environments:
  - name: "Bare Metal EE"
    description: "Custom EE with omsdk and dellemc.openmanage for iDRAC operations"
    organization: "Bare Metal Provisioning"
    image: "{{ custom_ee_image }}"
    pull: "missing"

# -----------------------------------------------------------------------------
# Job Templates
# -----------------------------------------------------------------------------
controller_templates:
  - name: "Provision RHEL 9"
    description: "Boot Dell T620 to unattended RHEL 9 ISO via iDRAC BootToNetworkISO over NFS"
    organization: "Bare Metal Provisioning"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/provision_rhel9.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 iDRAC"

  - name: "Wait for Install"
    description: "Wait for power off, detach virtual media, boot to disk, verify RHEL 9"
    organization: "Bare Metal Provisioning"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/wait_for_install.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 iDRAC"
      - "T620 SSH"

  - name: "Configure RHEL 9"
    description: "Register with RHSM and deploy demo web application"
    organization: "Bare Metal Provisioning"
    job_type: "run"
    project: "Bare Metal Automation"
    playbook: "playbooks/configure_rhel9.yml"
    inventory: "Bare Metal Deployment"
    execution_environment: "Bare Metal EE"
    credentials:
      - "T620 SSH"
      - "Red Hat Subscription"

# -----------------------------------------------------------------------------
# Workflow Templates
# -----------------------------------------------------------------------------
controller_workflows:
  - name: "End-to-End Bare Metal Deployment"
    description: "Provision RHEL 9 on bare metal, then configure the host with a demo application"
    organization: "Bare Metal Provisioning"
    simplified_workflow_nodes:
      - identifier: "Provision RHEL 9"
        unified_job_template: "Provision RHEL 9"
        success_nodes:
          - "Wait for Install"

      - identifier: "Wait for Install"
        unified_job_template: "Wait for Install"
        success_nodes:
          - "Configure RHEL 9"

      - identifier: "Configure RHEL 9"
        unified_job_template: "Configure RHEL 9"
