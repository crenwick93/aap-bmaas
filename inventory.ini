[idrac]
192.168.50.252

[idrac:vars]
ansible_connection=local
# Point at the python that has omsdk installed (EE python in AAP; venv python locally)
# ansible_python_interpreter=/path/to/venv/bin/python

[t620]
# After provisioning, the T620 gets an IP via DHCP.
# Replace with the actual IP once the host is up, or use the hostname
# if DNS/hosts-file resolves t620-demo.
t620-demo ansible_host=REPLACE_WITH_T620_IP ansible_user=ansible

# -----------------------------------------------------------------------------
# Server definitions — drives kickstart generation via generate_kickstarts.yml
# Add more hosts here; one kickstart is generated per entry.
# -----------------------------------------------------------------------------
[servers]
t620-demo ks_hostname=t620-demo ks_root_password_hash=REPLACE_WITH_SHA512_HASH
